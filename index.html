<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUEENHANSI-MD - THANUJADILSHAN™</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="app-icon">👻</div>
            <h1>THANUJADILSHAN™</h1>
            <p class="bot-name">QUEENHANSI-MD</p>
        </div>

        <div class="button-group">
            <a href="https://dashboard.render.com" class="rgb-btn">DEPLOY</a>
            <button class="rgb-btn" onclick="toggleSession()">SESSION</button>
        </div>

        <div id="session-options" class="hidden">
            <div class="button-group">
                <button class="rgb-btn-small" onclick="showPair()">PAIR CODE</button>
                <button class="rgb-btn-small">QR CODE</button>
            </div>
        </div>

        <div id="pair-section" class="hidden">
            <div class="rgb-input-box">
                <input type="text" placeholder="+947xxxxxxxxx">
                <button class="submit-btn">GET CODE</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSession() {
            document.getElementById('session-options').classList.toggle('hidden');
        }
        function showPair() {
            document.getElementById('pair-section').classList.toggle('hidden');
        }
    </script>
</body>
</html>
